# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 23 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  download_rss_job:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: download yaml latest from nodefree
      # Runs a set of commands using the runners shell
        id: step2
        run: |
          year=`date "+%Y"`
          mouth=`date "+%m"`
          day=`date "+%d"`
          clock=`date "+%Y%m%d%H%M%S"`
          # Other steps that change files in the repository
          mkdir -p node
          curl https://nodefree.org/dy/$year/$mouth/$year$mouth$day.yaml > node/nodefree.yaml
          echo "clock=$(($clock))" >> $GITHUB_OUTPUT
          sed -i '/^\s*#/d' nodefree.yaml

      # Commit all changed files back to the repository
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message:  ${{ steps.step2.outputs.clock }} updated

  get_tv_interface_job:
    runs-on: ubuntu-latest    
    steps:
      - uses: actions/checkout@v4
      - name: download json and default first
        id: step2
        run: |
          mkdir -p json
          arr=(
            http://xhww.fun/小米/DEMO.json
            http://www.饭太硬.top/tv
            http://我不是.肥猫.live/接口禁止贩卖
            https://github.moeyy.xyz/raw.githubusercontent.com/gaotianliuyun/gao/master/0827.json
          )
          curl -o dancang.json ${arr[i]}
          for(( i=1;i<${#arr[@]};i++)) do
            echo ${arr[i]};
            curl -O ${arr[i]}
          done;
          echo "clock=`date "+%Y%m%d%H%M%S"`" >> $GITHUB_OUTPUT
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message:  ${{ steps.step2.outputs.clock }} updated

