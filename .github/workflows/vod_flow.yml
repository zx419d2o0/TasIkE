# This is a basic workflow to help you get started with Actions

name: tv/vod

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # push:
  #   branches: [ "main" ]
  schedule:
    - cron: '0 23 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  get_tv_interface_job:
    runs-on: ubuntu-latest    
    steps:
      - uses: actions/checkout@v4
      - name: download json and default first
        id: step2
        run: |
          clock=`date "+%Y%m%d%H%M%S"`
          echo "clock=$(($clock))" >> $GITHUB_OUTPUT
          # rm -rf tv/vod/js
          # rm -rf tv/vod/lib
          mkdir -p tv/vod/js
          mkdir -p tv/vod/lib
          echo "||https://hub.gitmirror.com/https://raw.githubusercontent.com/zx419d2o0/TasIkE/main/tv/vod/jsm.json|" > tv/vod/README.md
          echo "|---|---|" >> tv/vod/README.md
          git clone https://github.com/gaotianliuyun/gao.git
          mv gao/jar/pg.jar tv/vod/
          md5sum tv/vod/pg.jar | cut -d ' ' -f 1 > tv/vod/pg.jar.md5
          mv gao/js.json tv/vod/
          sed -i 's#"spider":"./jar/pg.jar.*"#"spider":"./pg.jar;"#' tv/vod/js.json
          sed -i '/\.\/json\/d' tv/vod/js.json
          mv gao/js/* tv/vod/js/
          mv gao/lib/* tv/vod/lib/
          arr=(
            http://xhww.fun/小米/DEMO.json
            https://gitee.com/okjack/okk/raw/master/ok.txt
            http://我不是.肥猫.live/接口禁止贩卖
            http://ygbhbox.3vfree.club/pg/jsm.json
            https://github.moeyy.xyz/raw.githubusercontent.com/gaotianliuyun/gao/master/js.json
            )
          # curl -o json/dancang.json ${arr[0]}
          # echo "current   ${arr[0]}">json/$clock.log
          # for(( i=1;i<${#arr[@]};i++)) do
          #   echo "$i   ${arr[i]}">>json/README.md
          #   curl -o json/${i}.json ${arr[i]}
          # done
          for i in "${!arr[@]}";
          do
            curl -o tv/vod/$i.json ${arr[i]}
            echo "|[$i](https://hub.gitmirror.com/https://raw.githubusercontent.com/zx419d2o0/TasIkE/main/tv/vod/$i.json)|${arr[i]}|">>tv/vod/README.md
          done
          rm -rf gao
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message:  ${{ steps.step2.outputs.clock }} updated
          push_options: '--force'
