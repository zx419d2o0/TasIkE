# This is a basic workflow to help you get started with Actions

name: rss clash

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # push:
  #   branches: [ "main" ]
  schedule:
    - cron: '0 23 */3 * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  download_rss_job:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: download yaml latest from nodefree
      # Runs a set of commands using the runners shell
        id: step2
        run: |
          year=`date "+%Y"`
          month=`date "+%m"`
          day=`date "+%d"`
          clock=`date "+%Y%m%d%H%M%S"`
          echo "clock=$(($clock))" >> $GITHUB_OUTPUT
          # Other steps that change files in the repository
          mkdir -p node
          arr=(
            "https://nodefree.org/dy/$year/$month/$year$month$day.yaml,nodefree.yam"
            "https://nodefree.org/dy/$year/$month/$year$month$day.txt,nodefree.txt"
            "https://clashfreenodes.github.io/uploads/$year/$month/0-$year$month$day.yaml,clashfreenodes_0.yaml"
            "https://clashfreenodes.github.io/uploads/$year/$month/1-$year$month$day.yaml,clashfreenodes_1.yaml"
            "https://clashfreenodes.github.io/uploads/$year/$month/2-$year$month$day.yaml,clashfreenodes_2.yaml"
            "https://clashfreenodes.github.io/uploads/$year/$month/3-$year$month$day.yaml,clashfreenodes_3.yaml"
            "https://clashfreenodes.github.io/uploads/$year/$month/4-$year$month$day.yaml,clashfreenodes_4.yaml"
            "https://clashfreenodes.github.io/uploads/$year/$month/0-$year$month$day.txt,clashfreenodes_0.txt"
            "https://clashfreenodes.github.io/uploads/$year/$month/1-$year$month$day.txt,clashfreenodes_1.txt"
            "https://clashfreenodes.github.io/uploads/$year/$month/2-$year$month$day.txt,clashfreenodes_2.txt"
            "https://clashfreenodes.github.io/uploads/$year/$month/3-$year$month$day.txt,clashfreenodes_3.txt"
            "https://clashfreenodes.github.io/uploads/$year/$month/4-$year$month$day.txt,clashfreenodes_4.txt"
          )
          echo "||||" > node/README.md
          echo "|-|-|-|" >> node/README.md
          for i in "${!arr[@]}"; do
            IFS=',' read -r url name <<< "${arr[i]}"
            curl -o "node/$name" "$url"
            echo "|[$name](https://raw.gitmirror.com/zx419d2o0/TasIkE/main/node/$name)|$url|`du -h node/$name`|">>node/README.md
          done
          # sed -i '/^\s*#/d' node/nodefree.yaml

      # Commit all changed files back to the repository
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message:  ${{ steps.step2.outputs.clock }} updated
          push_options: '--force'
